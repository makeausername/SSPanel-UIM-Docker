expose_php = Off
display_errors = Off
log_errors = On
error_reporting = E_ALL

memory_limit = 256M
max_execution_time = 120
max_input_time = 120
max_input_vars = 3000

upload_max_filesize = 50M
post_max_size = 50M

cgi.fix_pathinfo = 0
realpath_cache_size = 4096K
realpath_cache_ttl = 600

session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax
