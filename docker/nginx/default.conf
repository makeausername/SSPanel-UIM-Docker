map $http_x_forwarded_proto $fastcgi_https {
    default off;
    https on;
}

map $http_x_forwarded_proto $session_cookie_secure {
    default 0;
    https 1;
}

map $http_x_forwarded_proto $strict_transport_security {
    default "";
    https "max-age=31536000; includeSubDomains";
}

server {
    listen 80;
    server_name _;

    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 2m;
    client_body_timeout 60s;
    send_timeout 60s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https: wss:; frame-src https:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    add_header Strict-Transport-Security $strict_transport_security always;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location = /locale {
        client_max_body_size 16k;
        client_body_timeout 10s;
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/(?:node|probe)/api/v1/ {
        client_max_body_size 2m;
        client_body_timeout 15s;
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTPS $fastcgi_https;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_REAL_IP $http_x_real_ip;
        fastcgi_param PHP_VALUE "session.cookie_secure=$session_cookie_secure";
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 16k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }
}
