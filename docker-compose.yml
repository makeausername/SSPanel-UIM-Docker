services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sspanel-uim:php83-fpm
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_NAME: ${APP_NAME:-SSPanel-UIM}
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-sspanel}
      DB_USERNAME: ${DB_USERNAME:-sspanel}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.docker}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - app_storage:/var/www/html/storage/framework
      - app_clients:/var/www/html/public/clients
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sspanel

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - app_clients:/var/www/html/public/clients:ro
    networks:
      - sspanel

  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-sspanel}
      MARIADB_USER: ${DB_USERNAME:-sspanel}
      MARIADB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.docker}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env.docker}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --sql-mode=NO_ENGINE_SUBSTITUTION
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root --password=\"$${MARIADB_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sspanel

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TZ: ${TZ:-Asia/Shanghai}
    command: >
      sh -c 'if [ -n "$${REDIS_PASSWORD:-}" ]; then
        exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}";
      else
        exec redis-server --appendonly yes;
      fi'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD:-}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - sspanel

  scheduler:
    image: sspanel-uim:php83-fpm
    restart: unless-stopped
    command: ["/var/www/html/docker/cron/scheduler"]
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_NAME: ${APP_NAME:-SSPanel-UIM}
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-sspanel}
      DB_USERNAME: ${DB_USERNAME:-sspanel}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.docker}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - app_storage:/var/www/html/storage/framework
      - app_clients:/var/www/html/public/clients
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sspanel

volumes:
  mariadb_data:
  redis_data:
  app_storage:
  app_clients:

networks:
  sspanel:
    driver: bridge
