services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sspanel-uim:php83-fpm
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_NAME: ${APP_NAME:-SSPanel-UIM}
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-sspanel}
      DB_USERNAME: ${DB_USERNAME:-sspanel}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TZ: ${TZ:-Asia/Shanghai}
      PHP_FPM_PM: ${PHP_FPM_PM:-dynamic}
      PHP_FPM_MAX_CHILDREN: ${PHP_FPM_MAX_CHILDREN:-20}
      PHP_FPM_START_SERVERS: ${PHP_FPM_START_SERVERS:-4}
      PHP_FPM_MIN_SPARE_SERVERS: ${PHP_FPM_MIN_SPARE_SERVERS:-2}
      PHP_FPM_MAX_SPARE_SERVERS: ${PHP_FPM_MAX_SPARE_SERVERS:-8}
      PHP_FPM_MAX_REQUESTS: ${PHP_FPM_MAX_REQUESTS:-500}
    volumes:
      - ./config/.config.php:/var/www/html/config/.config.php:ro
      - ./config/appprofile.php:/var/www/html/config/appprofile.php:ro
      - app_storage:/var/www/html/storage/framework
      - geoip_city:/var/www/html/storage/GeoLite2-City
      - geoip_country:/var/www/html/storage/GeoLite2-Country
      - app_clients:/var/www/html/public/clients
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sspanel

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      - app
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - app_clients:/var/www/html/public/clients:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/index.php"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - sspanel

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      - nginx
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-http://:80}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - sspanel

  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-sspanel}
      MARIADB_USER: ${DB_USERNAME:-sspanel}
      MARIADB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/99-sspanel.cnf:/etc/mysql/conf.d/99-sspanel.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root --password=\"$${MARIADB_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sspanel

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TZ: ${TZ:-Asia/Shanghai}
    command: >
      sh -c 'if [ -n "$${REDIS_PASSWORD:-}" ]; then
        exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$${REDIS_PASSWORD}";
      else
        exec redis-server /usr/local/etc/redis/redis.conf;
      fi'
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD:-}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - sspanel

  scheduler:
    image: sspanel-uim:php83-fpm
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    command:
      - bash
      - /var/www/html/docker/cron/scheduler
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_NAME: ${APP_NAME:-SSPanel-UIM}
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-sspanel}
      DB_USERNAME: ${DB_USERNAME:-sspanel}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TZ: ${TZ:-Asia/Shanghai}
      SCHEDULER_HEARTBEAT_MAX_AGE_SECONDS: ${SCHEDULER_HEARTBEAT_MAX_AGE_SECONDS:-900}
    volumes:
      - ./config/.config.php:/var/www/html/config/.config.php:ro
      - ./config/appprofile.php:/var/www/html/config/appprofile.php:ro
      - app_storage:/var/www/html/storage/framework
      - geoip_city:/var/www/html/storage/GeoLite2-City
      - geoip_country:/var/www/html/storage/GeoLite2-Country
      - app_clients:/var/www/html/public/clients
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "heartbeat=$$(cat /var/www/html/storage/framework/scheduler.last_success 2>/dev/null || echo 0); now=$$(date +%s); [ \"$$heartbeat\" -gt 0 ] && [ $$((now - heartbeat)) -le \"$${SCHEDULER_HEARTBEAT_MAX_AGE_SECONDS}\" ]"]
      interval: 30s
      timeout: 5s
      retries: 6
      start_period: 60s
    networks:
      - sspanel

volumes:
  mariadb_data:
  redis_data:
  app_storage:
  geoip_city:
  geoip_country:
  app_clients:
  caddy_data:
  caddy_config:

networks:
  sspanel:
    driver: bridge
